<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Camp 404">
  <!-- Midnight-violet base, matching --color-background / themeColor #0d061e -->
  <rect width="64" height="64" rx="12" fill="#0d061e" />
  <!-- Three stacked "404"s offset a hair apart = the landing page's
       magenta/cyan RGB-split glitch, frozen to a single frame so it
       reads at 16px in a browser tab. -->
  <g
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-size="27"
    font-weight="900"
    letter-spacing="-1.5"
    text-anchor="middle"
  >
    <text x="30.5" y="42" fill="#ff008c">404</text>
    <text x="33.5" y="42" fill="#00dcff">404</text>
    <text x="32" y="42" fill="#f7ecf3">404</text>
  </g>
</svg>
